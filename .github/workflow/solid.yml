name: Build EblanHack

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        lfs: true
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install deps
      run: |
        pip install pyinstaller customtkinter ultralytics opencv-python numpy mss pyautogui pydirectinput pynput pywin32 pillow
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "EblanHack" --add-data "cs2_yolov10s.pt;." eblanhack.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: EblanHack
        path: dist/EblanHack.exe
        
    - name: Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/EblanHack.exe
        name: EblanHack ${{ github.ref_name }}
        body: |
          🔥 EblanHack PRO
          
          Скачай и запусти от админа!
          
          Фичи:
          - Wallshot (пуля сквозь стены)
          - Autowall (выстрел за угол)
          - Glow ESP
          - Radar Hack
          - Speed Hack
          - No Recoil
          - Aimbot + Triggerbot
          - BunnyHop